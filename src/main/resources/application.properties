spring.application.name=early-warning
server.port=8080


spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.enabled=true


app.upload-dir=${user.dir}/data/upload
app.bearing-model-dir=${user.dir}/python
app.bearing-python-executable=python

# JWT
app.jwt.secret=${jwt_secret}
app.jwt.expire-hours=2

# Redis
spring.data.redis.host=192.168.137.107
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.database=0

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/early_warning?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=${sql_password}

# UTF-8
spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.enabled=true
spring.servlet.encoding.force=true

spring.security.user.name=admin
spring.security.user.password=${security_password}

# LM Studio
app.llm.api-url=http://127.0.0.1:1234
app.llm.api-key=${api_key}
app.llm.model=qwen/qwen3.5-9b

# AI
app.report-enabled=true
#
app.report-cron=0 0 9 ? * FRI
app.report-dir=${user.dir}/data/Report

