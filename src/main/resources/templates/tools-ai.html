<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>工具-AI助理 - 滚动轴承故障智能预警系统</title>
  <link rel="stylesheet" href="https://unpkg.com/layui@2.8.18/dist/css/layui.css"/>
  <link rel="stylesheet" href="/css/app.css"/>
  <style>
    .ew-chat-wrap { display: flex; flex-direction: column; height: calc(100vh - 120px); max-height: 680px; }
    .ew-chat-messages { flex: 1; overflow-y: auto; padding: 12px; background: #f8f9fb; border-radius: 8px; margin-bottom: 12px; }
    .ew-chat-msg { margin-bottom: 16px; display: flex; }
    .ew-chat-msg.user { justify-content: flex-end; }
    .ew-chat-msg.assistant { justify-content: flex-start; }
    .ew-chat-bubble { max-width: 75%; padding: 10px 14px; border-radius: 12px; white-space: pre-wrap; word-break: break-word; line-height: 1.5; }
    .ew-chat-msg.user .ew-chat-bubble { background: #1e88e5; color: #fff; border-bottom-right-radius: 4px; }
    .ew-chat-msg.assistant .ew-chat-bubble { background: #fff; color: #333; box-shadow: 0 1px 2px rgba(0,0,0,.06); border-bottom-left-radius: 4px; }
    .ew-chat-input-row { display: flex; gap: 8px; align-items: center; padding: 8px 0; }
    .ew-chat-input-row .layui-input { flex: 1; }
    .ew-chat-placeholder { color: #999; font-size: 13px; padding: 20px; text-align: center; }
  </style>
</head>
<body>
  <div class="layui-layout layui-layout-admin">
    <div th:replace="~{fragments/common :: header}"></div>
    <div th:replace="~{fragments/common :: sidebar}"></div>
    <div class="layui-body">
      <div class="ew-page-wrap">
        <div class="layui-card ew-card">
          <div class="layui-card-header">AI助理（本地大模型）</div>
          <div class="layui-card-body">
            <p style="color:#667ea8;margin-bottom:12px;">
              基于本地模型，可咨询轴承故障、预警方式、1D-CNN 等。
            </p>
            <div class="ew-chat-wrap">
              <div class="ew-chat-messages" id="chatMessages">
                <div class="ew-chat-placeholder" id="chatPlaceholder">在此显示对话记录</div>
              </div>
              <div class="ew-chat-input-row">
                <input type="text" id="faqQuestion" placeholder="请输入您的问题" class="layui-input" autocomplete="off"/>
                <button type="button" class="layui-btn" id="faqBtn">发送</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div th:replace="~{fragments/common :: footer}"></div>
  </div>

  <script src="https://unpkg.com/layui@2.8.18/dist/layui.js"></script>
  <script th:replace="~{fragments/common :: logoutScript}"></script>
  <script>
    layui.use(['layer'], function(){
      var layer = layui.layer;
      var messagesEl = document.getElementById('chatMessages');
      var placeholderEl = document.getElementById('chatPlaceholder');
      var inputEl = document.getElementById('faqQuestion');
      var btnEl = document.getElementById('faqBtn');

      function hidePlaceholder() {
        if (placeholderEl) placeholderEl.style.display = 'none';
      }

      function appendUserMessage(text) {
        hidePlaceholder();
        var wrap = document.createElement('div');
        wrap.className = 'ew-chat-msg user';
        wrap.innerHTML = '<div class="ew-chat-bubble">' + escapeHtml(text) + '</div>';
        messagesEl.appendChild(wrap);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function appendAssistantBubble() {
        hidePlaceholder();
        var wrap = document.createElement('div');
        wrap.className = 'ew-chat-msg assistant';
        var bubble = document.createElement('div');
        bubble.className = 'ew-chat-bubble';
        bubble.textContent = '';
        wrap.appendChild(bubble);
        messagesEl.appendChild(wrap);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return bubble;
      }

      function escapeHtml(s) {
        var div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
      }

      btnEl.onclick = function() {
        var q = inputEl.value.trim();
        if (!q) {
          layer.msg('请输入问题', { icon: 2 });
          return;
        }
        inputEl.value = '';
        appendUserMessage(q);
        var assistantBubble = appendAssistantBubble();
        btnEl.disabled = true;

        var fd = new FormData();
        fd.append('question', q);
        inputEl.disabled = true;
        fetch('/api/tools/faq/stream', { method: 'POST', body: fd, credentials: 'include' })
          .then(function(res) {
            if (!res.ok) throw new Error(res.statusText);
            return res.body.getReader();
          })
          .then(function(reader) {
            var decoder = new TextDecoder();
            var buf = '';
            function processBlock(block) {
              var lines = block.split(/\r?\n/);
              var dataLines = lines
                .filter(function(l) { return l.startsWith('data:'); })
                .map(function(l) { return l.slice(5).trim(); });
              if (!dataLines.length) return;
              try {
                var json = JSON.parse(dataLines.join('\n'));
                if (json.content) {
                  assistantBubble.textContent += json.content;
                  messagesEl.scrollTop = messagesEl.scrollHeight;
                }
                if (json.error) {
                  assistantBubble.textContent = (assistantBubble.textContent || '') + '\n[错误] ' + json.error;
                }
              } catch (e) {}
            }
            function read() {
              reader.read().then(function(r) {
                buf += r.done ? '' : decoder.decode(r.value, { stream: true });
                var parts = buf.split(/\r?\n\r?\n/);
                buf = r.done ? '' : parts.pop();
                for (var i = 0; i < parts.length; i++) processBlock(parts[i]);
                if (r.done) {
                  if (buf.trim()) processBlock(buf);
                  btnEl.disabled = false;
                  inputEl.disabled = false;
                  return;
                }
                read();
              }).catch(function(err) {
                assistantBubble.textContent += (assistantBubble.textContent ? '\n' : '') + '[请求异常] ' + (err.message || '连接中断');
                btnEl.disabled = false;
                inputEl.disabled = false;
              });
            }
            read();
          })
          .catch(function(err) {
            assistantBubble.textContent = '[请求失败] ' + (err.message || '请稍后重试');
            btnEl.disabled = false;
            inputEl.disabled = false;
          });
      }
      inputEl.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          btnEl.click();
        }
      });
    });
  </script>
</body>
</html>
